name: 한국어 극한 스트레스 테스트 (5단계)
description: |
  단순 한국어 답변(L1)부터 존대법/사투리/관용어/법률용어 혼합(L5)까지.
  모델의 한국어 뉘앙스 이해 능력의 한계를 측정한다.
type: qa_with_context
evaluator: llm_judge
judge_criteria: correctness

inputs:
  # ── L1: 단순 한국어 사실 답변 ──
  - context: |
      대한민국의 수도는 서울이며, 인구는 약 5,100만 명이다. 공식 언어는 한국어이다.
    question: "[L1] 대한민국의 수도와 인구를 답하세요."
    reference: "수도: 서울, 인구: 약 5,100만 명"

  - context: |
      한글은 1443년 세종대왕이 창제했으며, 1446년에 반포되었다. 자음 14자와 모음 10자로 구성된다.
    question: "[L1] 한글의 창제 연도와 구성을 설명하세요."
    reference: "1443년 세종대왕 창제, 1446년 반포. 자음 14자, 모음 10자."

  # ── L2: 존대법 구분 ──
  - context: |
      한국어 존대법 체계:
      - 하십시오체(격식 높임): "보고서를 제출하십시오."
      - 해요체(비격식 높임): "보고서를 제출해요."
      - 해체(비격식 낮춤, 반말): "보고서를 제출해."
      - 하오체(격식 높임, 고어): "보고서를 제출하시오."
      상황: 신입사원이 부장에게 회의 일정을 물어보는 상황.
    question: "[L2] 신입사원이 부장에게 '내일 회의 시간'을 물어보는 문장을 하십시오체와 해요체 각각으로 작성하고, 어색한 표현이 있다면 교정하세요."
    reference: "하십시오체: '부장님, 내일 회의 시간을 알려 주시겠습니까?' 해요체: '부장님, 내일 회의 몇 시에 하는지 알 수 있을까요?'"

  - context: |
      한국 비즈니스 이메일 예절:
      - 제목: 간결하게 핵심 용건 기재
      - 인사: 수신자 직함 + 성함 + "님" (예: 김 부장님)
      - 본문: 용건을 먼저 밝히고, 배경 설명은 뒤에
      - 마무리: "검토 부탁드립니다" 또는 "확인 부탁드립니다"
      - 서명: 소속, 이름, 연락처
      상황: 대리 직급의 직원이 타 부서 과장에게 프로젝트 협업 요청.
    question: "[L2] 위 예절을 모두 지켜서 협업 요청 이메일을 작성하세요."
    reference: "제목: [협업 요청] XX 프로젝트 관련 미팅 요청의 건 / 본문: 이 과장님, 안녕하십니까. 개발팀 OOO 대리입니다. OO 프로젝트 관련하여... 검토 부탁드립니다."

  # ── L3: 관용어/속담 해석 + 문맥 추론 ──
  - context: |
      다음 대화를 읽고 질문에 답하세요.

      팀장: "이번 분기 실적이 발등에 불이 떨어졌어요."
      과장: "네, 그런데 김 대리가 식은 죽 먹기라고 하더라고요."
      팀장: "김 대리는 항상 호랑이 담배 피우던 시절 얘기만 해요. 지금은 누워서 떡 먹기가 아니라고요."
      과장: "맞습니다. 소 잃고 외양간 고치기 전에 대책을 세워야죠."
      팀장: "사공이 많으면 배가 산으로 가니까, 제가 방향을 정하겠습니다."
    question: "[L3] 대화에 사용된 관용어/속담 5개를 각각 식별하고, 일반적 의미와 이 대화 맥락에서의 구체적 의미를 설명하세요."
    reference: "1) 발등에 불이 떨어지다: 일반-급박한 상황 / 맥락-실적 마감이 촉박. 2) 식은 죽 먹기: 일반-매우 쉬운 일 / 맥락-김대리가 실적 달성을 쉽게 봄. 3) 호랑이 담배 피우던 시절: 일반-아주 오래전 / 맥락-과거 좋았던 시절의 경험만 언급. 4) 소 잃고 외양간 고치기: 일반-일을 그르친 뒤 뒤늦은 대처 / 맥락-실적 실패 전에 미리 대비. 5) 사공이 많으면 배가 산으로 간다: 일반-지휘자가 많으면 혼란 / 맥락-팀장이 의사결정 주도 선언."

  - context: |
      다음 문장들의 뉘앙스 차이를 분석하세요:
      A: "괜찮습니다."
      B: "괜찮아요."
      C: "괜찮습니다만..."
      D: "뭐, 괜찮아요."
      E: "네, 괜찮습니다." (미소를 지으며)
      F: "괜찮아요, 괜찮아요." (손사래를 치며)

      상황: 동료가 실수로 본인의 노트북에 커피를 쏟은 직후.
    question: "[L3] A~F 각각의 화자의 실제 감정/의도를 추론하세요. 한국 문화의 '눈치'와 '체면' 개념을 반영하세요."
    reference: "A: 격식 높임, 실제 괜찮음 또는 감정 억제. B: 부드러운 수용, 괜찮다는 의사. C: 불만이 있지만 직접 표현 회피('만'으로 반전 암시). D: 약간 불쾌하나 체면상 넘기려는 태도('뭐'가 무관심 가장). E: 진심으로 괜찮음(미소=진정성 표현). F: 매우 당황했거나 불쾌하지만 상대 체면을 세워주려 과잉 수용(반복+손사래=진심이 아닐 가능성)."

  # ── L4: 격식체/비격식체 혼용 + 세대별 언어 차이 ──
  - context: |
      다음은 같은 의미를 세대별로 다르게 표현한 것입니다.

      [원문] "이 프로젝트의 마감이 내일이라 매우 급합니다."

      50대 부장: "내일이 데드라인인데 참 곤란하게 됐네. 야근 각오해야 할 것 같아."
      30대 팀장: "마감 내일인데 좀 빡세네요. 오늘 달려야 할 것 같습니다."
      20대 사원 (사내 메신저): "마감 내일ㅋㅋ 레전드... 오늘 밤샘각인 듯 ㅠㅠ"
      20대 사원 (보고서): "내일 마감을 앞두고 있어 추가 작업이 필요한 상황입니다."

      추가 맥락:
      - 'ㅋㅋ'는 웃음 표현이지만 이 맥락에서는 자조/고소 의미
      - '각'은 '각오'의 축약, MZ세대 신조어
      - '레전드'는 원래 '전설'이지만 MZ세대 용법으로는 '극단적 상황'
      - '빡세다'는 구어체로 '힘들다/빡빡하다'의 의미
    question: "[L4] 각 화자의 표현에서 세대별 언어 특성을 분석하고, 20대 사원이 메신저와 보고서에서 다른 언어를 사용하는 이유를 한국의 '코드 스위칭' 관점에서 설명하세요. 또한 '마감 내일ㅋㅋ'에서 'ㅋㅋ'의 정확한 화용론적 기능을 설명하세요."
    reference: "50대: 한자어+격식 구어('곤란','각오'), 직접적 지시. 30대: 격식/비격식 혼용('빡세다'+'-습니다'), 구어적 격식. 20대 메신저: 축약어+이모티콘+신조어, 정서적 유대 코드. 20대 보고서: 완전한 격식체, 감정 배제. 코드 스위칭: 한국 사회의 상황별 격식 수준이 언어 선택을 결정. 메신저=동료 간 수평적 소통(인그룹 코드), 보고서=조직 내 수직적 소통(아웃그룹 격식). 'ㅋㅋ'의 화용: 웃음이 아닌 자조적 반응(helpless laughter), 부정적 상황을 유머로 완화하는 방어 기제."

  - context: |
      다음 두 사과문을 비교하세요.

      [사과문 A — CEO 공식 성명]
      "이번 사태로 불편을 겪으신 고객님께 진심으로 사과드립니다. 재발 방지를 위해 최선을 다하겠습니다."

      [사과문 B — CEO 기자회견]
      "저희가 미흡했습니다. 변명의 여지가 없습니다. 고객님들께 머리 숙여 사죄드리며, 이번 일의 원인을 낱낱이 밝히고 책임지겠습니다. 구체적인 보상 방안은 이번 주 금요일까지 발표하겠습니다."

      한국 기업 사과문 관례:
      - '불편을 겪으신'은 책임 축소 표현으로 비판받는 경우 다수
      - '진심으로'는 역설적으로 진정성 의심을 살 수 있음
      - '최선을 다하겠습니다'는 구체성 부재로 공허한 약속으로 인식
      - 구체적 보상 일정 제시는 진정성 지표
    question: "[L4] 두 사과문의 한국어 화용론적 차이를 분석하세요. 각 표현이 한국 대중에게 어떻게 수용될지 예측하고, 사과문 A의 문제점을 구체적으로 지적하세요."
    reference: "사과문 A 문제: 1)'불편을 겪으신'은 피해를 '불편'으로 축소→책임 회피 인식. 2)'진심으로'는 과잉 수식→오히려 진정성 의심. 3)'최선을 다하겠습니다'는 구체적 행동 없는 공허한 약속→빈말 인식. 사과문 B: 1)'미흡했습니다'=자기 책임 인정. 2)'변명의 여지가 없습니다'=완전한 수용. 3)'머리 숙여'=물리적 사과 표현→진정성. 4)금요일까지 보상안=구체적 시한→신뢰. 한국 대중 수용: A는 '맞춤형 사과문'으로 비난, B는 긍정적 수용 가능성 높음."

  # ── L5: 법률/행정 한국어 + 사투리 + 고어 혼합 (극한) ──
  - context: |
      [문서 1: 법률 조항]
      민법 제750조 (불법행위의 내용) 고의 또는 과실로 인한 위법행위로 타인에게 손해를 가한 자는 그 손해를 배상할 책임이 있다.

      민법 제751조 (재산 이외의 손해의 배상) ①타인의 신체, 자유 또는 명예를 해하거나 기타 정신상 고통을 가한 자는 재산 이외의 손해에 대하여도 배상할 책임이 있다.

      근로기준법 제46조 (휴업수당) ①사용자의 귀책사유로 휴업하는 경우에 사용자는 휴업기간 동안 그 근로자에게 평균임금의 100분의 70 이상의 수당을 지급하여야 한다.

      [문서 2: 할머니의 방언 증언 (경상도)]
      "그래 마, 우리 손주가 회사서 다쳤는데 사장이 모른 척하더라꼬. 석 달을 쉬었는데 돈 한 푼도 안 줬다 아이가. 병원비가 오백만 원이 넘었는데, 그기 다 우리가 냈다 아이가. 사장한테 전화하이 '원래 그런 기다'카더라고. 아이고, 우짜노."

      [문서 3: 조선시대 소송 문서 (현대어 번역)]
      "소인의 아들이 주인댁 일을 하다가 다리를 다쳤사옵니다. 주인댁에서는 '네 탓이니 알아서 하라'하시옵니다. 관가에서 밝혀주시옵소서."

      [문서 4: 법률 자문 요청서]
      의뢰인: 김OO (사고 당시 22세, 비정규직 일용근로자)
      사고: 작업장에서 안전모 미비 상태로 낙하물에 의한 두부 부상
      휴업: 3개월
      월 평균임금: 280만 원
      사측 대응: 산재 보험 미가입 상태. "본인 부주의"라며 보상 거부.
      의뢰인 요구: 휴업수당 + 치료비 + 위자료
    question: "[L5] 1) 할머니의 경상도 방언 증언을 표준어로 정확히 번역하세요. 2) 조선시대 소송 문서와 현대 법률 자문 요청의 공통점을 분석하세요. 3) 민법 750조, 751조, 근로기준법 46조를 적용하여 의뢰인이 받을 수 있는 최소 보상 금액을 법적 근거와 함께 산출하세요."
    reference: "1) 번역: '그래요, 우리 손주가 회사에서 다쳤는데 사장이 모르는 척하더라고요. 세 달을 쉬었는데 돈 한 푼도 안 줬잖아요. 병원비가 500만 원이 넘었는데, 그것을 다 우리가 냈잖아요. 사장에게 전화하니 원래 그런 거라고 하더라고요. 아이고, 어떡하지요.' 2) 공통점: 고용관계에서 약자의 산업재해, 사용자의 책임 회피, 제3기관(관가/법원)에 판단 요청. 시대가 달라도 노동자 보호의 본질적 구조 동일. 3) 산출: 휴업수당(근기법46조): 280만×70%×3개월=588만원. 치료비(민법750조): 500만원+α. 위자료(민법751조): 정신적 고통, 보통 300~500만원 수준. 최소 합계: 588+500+300=1,388만원. 추가: 산재 미가입 → 사업주가 직접 부담."

  - context: |
      [2024 신조어 사전 — AI 관련]
      - "갈비": 가성비(가격 대비 성능)의 극단적 축약
      - "삼귀다": 세 번 만나서 귀찮아지다 → 쉽게 포기하는 세대를 비꼬는 말
      - "스불재": 스스로 불러온 재앙
      - "알잘딱깔센": 알아서 잘 딱 깔끔하고 센스있게
      - "갓생": God + 생활, 계획적이고 생산적인 삶
      - "ㅇㅈ": 인정 (동의의 의미)

      [고전 한국어 표현]
      - "수고하셨습니다"의 기원: 원래 윗사람이 아랫사람에게 하는 치하. 현대에는 동료/아랫사람이 윗사람에게도 사용하여 논란.
      - "식사하셨습니까?": 실제 식사 여부가 아닌 안부 인사. 유래: 과거 식량이 부족했던 시절의 관습.

      [세대 갈등 시나리오]
      50대 임원이 사내 메신저에 올린 글:
      "MZ세대는 왜 '알잘딱깔센'이라는 말을 쓰는지 이해가 안 됩니다. 소통이 아니라 소통을 포기하는 것 아닙니까? 보고서에 줄임말을 쓰는 것은 프로페셔널하지 않습니다."

      20대 직원의 (익명 게시판) 반응:
      "ㅋㅋ 꼰대력 ㅇㅈ... 알잘딱깔센이 소통 포기라니 스불재임. 본인이 갓생 안 살면서 남 탓하는 거 아님?"
    question: "[L5] 1) 모든 신조어와 축약어의 정확한 의미를 풀어쓰세요. 2) 50대 임원의 발언과 20대 직원의 반응 각각의 논리적 타당성과 논리적 오류를 분석하세요. 3) '수고하셨습니다'의 사용 논란을 언어 변화(language change)와 언어 규범(prescriptivism vs descriptivism) 관점에서 설명하세요. 4) 이 세대 갈등을 해소할 수 있는 조직 문화 차원의 제안을 1가지 하세요."
    reference: "1) 갈비=가성비, 삼귀다=세번만나 귀찮아짐, 스불재=스스로 불러온 재앙, 알잘딱깔센=알아서 잘 딱 깔끔하고 센스있게, 갓생=God+생활(생산적 삶), ㅇㅈ=인정. 2) 임원: 타당-보고서에 줄임말은 부적절 / 오류-'알잘딱깔센'은 소통 포기가 아닌 소통 효율화의 의도(목적 오해). 직원: 타당-세대별 언어 변화는 자연스러운 현상 / 오류-인신공격('꼰대력')으로 논점 이탈, '갓생 안 산다'는 근거 없는 비약. 3) 규범주의: 원래 의미(윗→아랫)를 지켜야 한다. 기술주의: 언어는 사용자에 의해 변화하며 현재 용법도 유효. 역사적으로 대부분의 경어 체계는 점진적으로 민주화됨. 4) 제안 예: 세대 혼합 소통 워크숍 — 각 세대의 언어를 상호 소개하고, 공식/비공식 소통 채널에서의 언어 가이드라인을 함께 제정."
