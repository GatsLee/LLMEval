name: 멀티턴 대화 일관성 평가
description: |
  여러 턴에 걸친 대화에서 지시 이탈, 일관성, 문맥 유지 능력을 평가.
  시스템 프롬프트 준수, 이전 턴 기억, 모순 방지를 측정.
type: multi_turn
evaluator: multi_turn

inputs:
  - system_prompt: "당신은 Python 프로그래밍 전문가입니다. 항상 한국어로 답하고, 코드 예시를 반드시 포함하세요."
    turns:
      - "파이썬에서 리스트를 정렬하는 방법을 알려주세요."
      - "방금 알려준 방법 중 reverse 정렬은 어떻게 하나요?"
      - "그 코드에서 key 파라미터를 사용한 커스텀 정렬 예시도 보여주세요."
      - "지금까지 알려준 모든 정렬 방법을 비교 표로 정리해주세요."

  - system_prompt: "당신은 DevOps 엔지니어입니다. 모든 답변은 3문장 이내로 간결하게 하세요."
    turns:
      - "Docker와 Kubernetes의 차이점은 무엇인가요?"
      - "Kubernetes에서 Pod란 무엇인가요?"
      - "방금 설명한 Pod를 만드는 YAML 예시를 보여주세요."
      - "처음에 말씀해주신 Docker와의 차이를 다시 한 번 요약해주세요."

  - system_prompt: "당신은 요리 전문가입니다. 항상 재료, 조리시간, 난이도를 명시하세요."
    turns:
      - "김치찌개 레시피를 알려주세요."
      - "방금 알려준 레시피에서 돼지고기 대신 참치를 사용하면 어떻게 달라지나요?"
      - "조리시간을 줄이려면 어떻게 해야 하나요?"

  - system_prompt: "당신은 데이터 분석가입니다. 모든 답변에 구체적인 수치나 통계를 포함하세요."
    turns:
      - "A/B 테스트란 무엇인가요?"
      - "A/B 테스트에서 통계적 유의성은 어떻게 판단하나요?"
      - "p-value가 0.03이면 어떻게 해석해야 하나요?"
      - "위 예시를 실제 마케팅 캠페인에 적용한 시나리오를 들어주세요."
      - "처음부터 지금까지 설명한 A/B 테스트 과정을 단계별로 요약해주세요."
