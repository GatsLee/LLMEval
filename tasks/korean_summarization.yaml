name: 한국어 요약 품질 평가
description: |
  주어진 한국어 텍스트를 3문장 이내로 요약하는 태스크.
  ROUGE + LLM fluency judge로 품질 측정.
type: summarization
evaluator: summarization

inputs:
  - text: |
      최근 생성형 AI 시장이 급격히 성장하면서, 오픈소스 모델들의 성능이 클로즈드 모델에 근접하는 추세가 두드러지고 있다.
      메타의 Llama 3, 미스트랄의 Mistral 7B, 알리바바의 Qwen 2.5 등은 벤치마크에서 GPT-3.5를 능가하는 성능을 보여주고 있다.
      특히 로컬 실행이 가능한 소형 모델들의 발전으로, 클라우드 API 없이도 개인 서버에서 충분한 품질의 AI 서비스를 구축할 수 있게 되었다.
      이는 개인정보 보호와 비용 절감 측면에서 큰 의미를 가지며, 기업들의 AI 도입 장벽을 크게 낮추고 있다.
      전문가들은 2026년이 '로컬 AI 원년'이 될 것이라고 전망하고 있다.
    reference: "오픈소스 AI 모델이 클로즈드 모델에 근접하는 성능을 보이고 있다. Llama, Mistral, Qwen 등 소형 모델의 발전으로 로컬 실행이 가능해졌다. 이는 개인정보 보호와 비용 측면에서 의미 있는 변화이다."

  - text: |
      RAG(검색 증강 생성)는 LLM의 환각 문제를 줄이기 위한 핵심 기술로 자리잡았다.
      기존 LLM은 학습 데이터에 없는 최신 정보나 도메인 특화 지식에 취약했지만,
      RAG는 외부 문서 데이터베이스에서 관련 정보를 실시간으로 검색하여 이를 LLM의 컨텍스트에 주입함으로써 이 문제를 해결한다.
      벡터 데이터베이스와 임베딩 모델의 발전이 RAG의 실용성을 크게 높였으며,
      현재 기업용 AI 챗봇의 80% 이상이 RAG 기반으로 구축된다는 통계가 있다.
      청크 전략, 리랭킹, 하이브리드 검색 등의 최적화 기법이 RAG 품질을 결정한다.
    reference: "RAG는 외부 문서를 실시간 검색해 LLM의 환각 문제를 줄이는 기술이다. 벡터 DB와 임베딩 발전으로 실용성이 높아져 기업 AI의 주류가 되었다. 청크 전략, 리랭킹 등의 최적화가 RAG 품질을 결정한다."

  - text: |
      홈서버를 운영하는 사람들이 겪는 가장 큰 문제 중 하나는 문서화 부채다.
      서버를 처음 구축할 때는 모든 설정을 기억하고 있지만, 6개월이 지나면 왜 특정 포트를 열었는지,
      어떤 환경변수가 무슨 역할을 하는지조차 알 수 없게 된다.
      더 큰 문제는 하드웨어 교체나 OS 재설치 시 발생한다.
      이때 문서가 없으면 2시간이면 될 작업이 2주로 늘어나는 경우가 빈번하다.
      AI를 활용하면 기존 docker-compose.yml, nginx.conf, crontab 등의 파일을 분석하여
      자동으로 시스템 문서를 생성할 수 있다는 점에서 이 문제의 해결 가능성이 열리고 있다.
    reference: "홈서버 운영자들은 시간이 지날수록 설정 이유를 잊어버리는 문서화 부채를 겪는다. OS 재설치 등 이벤트 시 문서 부재로 복구가 수주가 걸리는 문제가 생긴다. AI로 기존 설정 파일을 분석해 자동 문서화하는 것이 해결책으로 떠오르고 있다."

  - text: |
      쿠버네티스(Kubernetes)는 컨테이너화된 애플리케이션의 배포, 확장, 관리를 자동화하는 오픈소스 플랫폼이다.
      구글이 내부 시스템 Borg에서 얻은 경험을 기반으로 2014년 오픈소스로 공개했다.
      파드(Pod), 디플로이먼트(Deployment), 서비스(Service) 등의 추상화 개념을 제공하며,
      선언적 설정 방식으로 원하는 상태를 정의하면 쿠버네티스가 이를 유지한다.
      현재 클라우드 네이티브 애플리케이션의 표준 인프라로 자리잡았지만,
      단일 노드 홈서버 환경에서는 과도한 복잡성으로 Docker Compose가 여전히 선호된다.
    reference: "쿠버네티스는 구글이 2014년 공개한 컨테이너 오케스트레이션 플랫폼이다. 선언적 설정으로 컨테이너 배포와 관리를 자동화하며 클라우드의 표준이 됐다. 홈서버 환경에서는 복잡성으로 Docker Compose가 더 선호된다."

  - text: |
      파인튜닝(Fine-tuning)은 사전학습된 대형 언어 모델을 특정 도메인이나 태스크에 맞게 추가 학습시키는 방법이다.
      전체 파라미터를 학습하는 풀 파인튜닝은 비용이 크기 때문에, LoRA와 같은 파라미터 효율적 방법이 주목받고 있다.
      LoRA는 원본 가중치는 고정한 채 저랭크 행렬만 학습하여 적은 메모리와 연산으로 효과적인 파인튜닝이 가능하다.
      소비자용 GPU로도 7B~13B 모델의 파인튜닝이 가능해지면서, 개인 연구자와 중소기업도 커스텀 모델을 만들 수 있게 되었다.
    reference: "파인튜닝은 사전학습 모델을 특정 태스크에 맞게 추가 학습하는 방법이다. LoRA는 저랭크 행렬만 학습해 적은 자원으로 효율적인 파인튜닝을 가능하게 한다. 소비자 GPU로도 대형 모델 파인튜닝이 가능해져 접근성이 높아졌다."
