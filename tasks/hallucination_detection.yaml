name: 할루시네이션 탐지 평가
description: |
  모델이 주어진 사실 정보 외에 지어낸 내용이 얼마나 있는지 측정.
  claim 분해 → 사실 대비 검증 → 환각 비율 산출.
type: hallucination_detection
evaluator: hallucination

inputs:
  - context: "이순신(1545~1598)은 조선 중기의 무신이다. 임진왜란 당시 해군을 이끌었다."
    known_facts: "이순신은 1545년 출생, 1598년 사망. 조선 중기 무신. 임진왜란 해군 지휘."
    question: "이순신 장군에 대해 알려진 사실을 설명하세요."

  - context: "비트코인은 2009년 사토시 나카모토에 의해 만들어진 암호화폐이다. 블록체인 기술을 사용한다."
    known_facts: "비트코인은 2009년 생성. 사토시 나카모토 창시. 블록체인 기반 암호화폐."
    question: "비트코인의 기원에 대해 설명하세요."

  - context: "지구의 둘레는 약 40,075km이다. 자전 주기는 약 24시간이며, 공전 주기는 약 365.25일이다."
    known_facts: "지구 둘레 약 40,075km. 자전 주기 약 24시간. 공전 주기 약 365.25일."
    question: "지구의 물리적 특성을 설명하세요."

  - context: "리눅스는 1991년 리누스 토르발스가 개발한 오픈소스 운영체제이다. 커널만을 리눅스라 하며, GNU 도구와 함께 사용된다."
    known_facts: "리눅스 커널 1991년 개발. 리누스 토르발스 개발자. 오픈소스. GNU 도구와 함께 사용."
    question: "리눅스의 역사와 특징을 설명하세요."

  - context: "인공지능의 아버지로 불리는 앨런 튜링은 1912년 영국에서 태어났다. 튜링 테스트를 제안했으며, 제2차 세계대전 중 에니그마 암호를 해독했다."
    known_facts: "앨런 튜링 1912년 영국 출생. 튜링 테스트 제안. 에니그마 암호 해독."
    question: "앨런 튜링의 업적을 설명하세요."

  - context: "대한민국은 1948년 8월 15일 정부 수립을 선포했다. 초대 대통령은 이승만이다."
    known_facts: "대한민국 정부 수립 1948년 8월 15일. 초대 대통령 이승만."
    question: "대한민국의 건국 과정을 설명하세요."
