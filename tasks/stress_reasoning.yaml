name: 추론 스트레스 테스트 (5단계)
description: |
  단일 사실 조회(L1)부터 5단계 연쇄 추론(L5)까지 점진적 난이도.
  각 레벨에서 모델의 추론 능력 한계를 관측한다.
type: qa_with_context
evaluator: llm_judge
judge_criteria: correctness

inputs:
  # ── L1: 단일 사실 조회 ──
  - context: |
      서버 A의 일일 트래픽은 120,000건이다.
    question: "[L1] 서버 A의 일일 트래픽은 몇 건인가요?"
    reference: "120,000건"

  - context: |
      Redis 인스턴스의 메모리 제한은 8GB이다.
    question: "[L1] Redis 인스턴스의 메모리 제한은 얼마인가요?"
    reference: "8GB"

  # ── L2: 2단계 추론 (1회 계산/비교) ──
  - context: |
      서비스 X의 응답시간: P50=45ms, P95=120ms, P99=350ms.
      SLA 기준: P95 응답시간 100ms 이하.
    question: "[L2] 서비스 X는 SLA를 충족하나요? P95 기준으로 판단하세요."
    reference: "미충족. P95=120ms > SLA 기준 100ms"

  - context: |
      팀 A: 스프린트 속도 평균 42포인트, 기술부채 비율 35%.
      팀 B: 스프린트 속도 평균 38포인트, 기술부채 비율 15%.
      순수 기능 개발 속도 = 스프린트 속도 × (1 - 기술부채 비율)
    question: "[L2] 어느 팀의 순수 기능 개발 속도가 더 높은가요? 계산 과정을 보이세요."
    reference: "팀 A: 42×0.65=27.3, 팀 B: 38×0.85=32.3. 팀 B가 더 높다."

  # ── L3: 3단계 연쇄 추론 (조건부 분기 포함) ──
  - context: |
      [CI/CD 파이프라인 규칙]
      1. lint 실패 → 빌드 중단
      2. 빌드 성공 + 커버리지 ≥ 80% → 스테이징 자동 배포
      3. 빌드 성공 + 커버리지 < 80% → 수동 승인 필요
      4. 스테이징 E2E 테스트 통과 → 프로덕션 배포
      5. E2E 실패 → 롤백 + 슬랙 알림

      현재 상태: lint 통과, 빌드 성공, 커버리지 78%, 수동 승인 완료, E2E 실패.
    question: "[L3] 현재 파이프라인의 최종 상태는? 각 단계를 순서대로 추적하세요."
    reference: "lint 통과 → 빌드 성공 → 커버리지 78%<80% → 규칙3: 수동 승인 필요 → 승인 완료 → 스테이징 배포 → E2E 실패 → 규칙5: 롤백 + 슬랙 알림. 최종: 롤백 상태, 슬랙 알림 발송."

  - context: |
      [데이터센터 이중화 정책]
      - 리전 A (도쿄): 평소 트래픽 60%, 최대 용량 100%
      - 리전 B (서울): 평소 트래픽 40%, 최대 용량 70%
      - 리전 A 장애 시: 트래픽 전량 리전 B로 전환
      - 리전 B 용량 초과 시: 큐잉 모드 진입 (처리율 70% 유지, 나머지 대기열)
      - 대기열 타임아웃: 30초, 초과 시 503 응답

      시나리오: 리전 A 장애 발생, 전체 트래픽 10,000 req/s
    question: "[L3] 리전 A 장애 시 리전 B의 상태를 분석하세요. 처리되는 요청과 503 응답을 받는 요청 비율을 계산하세요."
    reference: "전체 10,000 req/s가 리전 B로 전환. 리전 B 최대 용량 70%(=7,000 req/s). 용량 초과 → 큐잉 모드. 7,000 req/s 즉시 처리(70%), 3,000 req/s 대기열(30%). 대기열 30초 타임아웃 → 503. 즉, 70% 정상 처리, 30% 503 응답."

  # ── L4: 4단계 추론 (다중 제약 조건 + 최적화) ──
  - context: |
      [클라우드 비용 최적화]
      인스턴스 타입별 시간당 비용과 성능:
      - t3.small: $0.0208/hr, 2vCPU, 2GB RAM, 네트워크 버스트
      - t3.medium: $0.0416/hr, 2vCPU, 4GB RAM, 네트워크 버스트
      - m5.large: $0.096/hr, 2vCPU, 8GB RAM, 안정적 네트워크
      - c5.xlarge: $0.17/hr, 4vCPU, 8GB RAM, 고성능 컴퓨팅

      워크로드 요구사항:
      - 웹서버: 최소 2vCPU, 4GB RAM, 레플리카 3개, 네트워크 안정성 필요
      - 배치 처리: 최소 4vCPU, 8GB RAM, 1개, 하루 4시간만 사용
      - 캐시 서버: 최소 2vCPU, 8GB RAM, 2개, 24시간 상시

      월간 비용 = 시간당 비용 × 대수 × 월 사용 시간
      월 = 730시간
    question: "[L4] 각 워크로드에 최적의 인스턴스를 배정하고, 월간 총 비용을 계산하세요. 네트워크 안정성 제약을 반드시 반영하세요."
    reference: "웹서버: 네트워크 안정 필요→t3 제외→m5.large(2vCPU,8GB)→$0.096×3×730=$210.24. 배치: 4vCPU 필요→c5.xlarge→$0.17×1×(4hr×30일)=$20.40. 캐시: 8GB RAM 필요→m5.large→$0.096×2×730=$140.16. 총: $370.80"

  - context: |
      [마이크로서비스 장애 전파 분석]
      서비스 의존성 그래프:
      Gateway → Auth (타임아웃 2s) → UserDB
      Gateway → ProductAPI (타임아웃 3s) → ProductDB, InventoryAPI
      InventoryAPI (타임아웃 1s) → InventoryDB
      Gateway → OrderAPI (타임아웃 5s) → ProductAPI, PaymentAPI
      PaymentAPI (타임아웃 10s) → 외부결제사

      서킷 브레이커 설정: 5초 내 실패율 50% 초과 시 Open
      재시도 정책: 최대 2회 재시도, 간격 500ms

      시나리오: InventoryDB 응답 지연 3초로 증가
    question: "[L4] InventoryDB 지연이 어떤 서비스까지 전파되는지 분석하세요. 각 서비스의 타임아웃과 서킷 브레이커 동작을 고려하세요."
    reference: "InventoryDB 3초 지연 → InventoryAPI 타임아웃 1초 초과 → InventoryAPI 실패. 재시도 2회(+1초) → 3회 시도 모두 실패 → 서킷 브레이커 Open. ProductAPI → InventoryAPI 호출 실패 → ProductAPI 부분 장애(재고 정보 없음). Gateway→ProductAPI: 정상(3초 내 응답). OrderAPI→ProductAPI: ProductAPI 부분 장애 전파 → OrderAPI 부분 장애. Gateway→OrderAPI: 5초 내이므로 응답하지만 데이터 불완전. Auth/UserDB: 영향 없음. PaymentAPI: 영향 없음."

  # ── L5: 5단계 추론 (모순 탐지 + 계산 + 조건 분기 + 최적화 + 검증) ──
  - context: |
      [분산 시스템 CAP 정리 적용 문제]
      시스템 A:
      - 3노드 복제, 쿼럼 기반 읽기/쓰기 (W=2, R=2)
      - 네트워크 파티션 발생 시: 다수파(2노드)는 계속 서비스, 소수파(1노드) 거부
      - 읽기 일관성: R+W>N이면 강한 일관성 보장 (N=3, R+W=4>3 ✓)

      시스템 B:
      - 5노드 복제, W=3, R=2
      - 네트워크 파티션 시: 모든 노드 읽기 허용, 쓰기는 다수파만
      - 읽기 일관성: R+W>N이면 강한 일관성 (N=5, R+W=5=N)

      요구사항:
      - 99.99% 가용성 (연간 다운타임 52.6분 이하)
      - 강한 일관성 필수
      - 월 비용 한도: $500
      - 노드당 비용: $80/월
      - 네트워크 파티션 확률: 월 2회, 평균 15분

      질문 힌트: 시스템 B의 일관성 주장에 모순이 있을 수 있음.
    question: "[L5] 시스템 A와 B 중 요구사항을 모두 만족하는 것을 고르세요. 시스템 B의 일관성 주장을 검증하고, 비용과 가용성을 모두 계산하세요."
    reference: "시스템 B 일관성 검증: R+W=5=N → R+W>N 불충족(같을 뿐 초과 아님). 파티션 시 소수파(2노드)에서 읽기 허용 → stale read 가능 → 강한 일관성 위반. 시스템 A: 비용 3×$80=$240<$500 ✓. 파티션 시 소수파 거부 → 일관성 유지. 가용성: 파티션 시 1/3 노드 거부, 월 2회×15분=30분 부분 장애, 2/3 가용→실 다운 10분/월→연 120분>52.6분 ✗. 결론: 두 시스템 모두 모든 요구사항을 동시에 만족하지 못함. 트레이드오프 필요."

  - context: |
      [컨테이너 오케스트레이션 스케줄링]
      노드 풀:
      - GPU 노드 2대: 각 64GB RAM, 16CPU, 2×A100(80GB VRAM)
      - CPU 노드 4대: 각 32GB RAM, 8CPU
      - 스팟 노드 3대: 각 16GB RAM, 4CPU (30% 확률로 2시간 내 종료)

      배포할 워크로드 (우선순위순):
      1. ML 추론 서비스: GPU 1개 + 32GB RAM + 4CPU, 레플리카 3, 무중단 필수
      2. API 서버: 4GB RAM + 2CPU, 레플리카 6, 무중단 필수
      3. 배치 ML 학습: GPU 1개 + 64GB RAM + 8CPU, 레플리카 1, 중단 허용
      4. 로그 수집기: 512MB RAM + 0.5CPU, 모든 노드에 DaemonSet
      5. 데이터 전처리: 8GB RAM + 2CPU, 레플리카 4, 중단 허용

      제약조건:
      - GPU 워크로드는 GPU 노드에만 스케줄링
      - 무중단 워크로드는 스팟 노드 배치 불가
      - 단일 노드 장애 시에도 무중단 서비스 유지 (anti-affinity)
      - DaemonSet은 모든 노드에 1개씩

      검증: 배치 후 각 노드의 잔여 리소스를 계산하고, 스케줄링 불가능한 워크로드가 있으면 명시하세요.
    question: "[L5] 위 제약을 모두 만족하는 스케줄링 계획을 세우세요. 노드별 리소스 잔여량과 스케줄링 불가능한 워크로드를 밝히세요."
    reference: "DaemonSet(로그 수집) 먼저: 모든 9노드에 512MB+0.5CPU. GPU노드 잔여: 각 63.5GB RAM, 15.5CPU, 2GPU. CPU노드 잔여: 각 31.5GB, 7.5CPU. 스팟노드 잔여: 각 15.5GB, 3.5CPU. ML추론(3레플): GPU 필요+무중단→GPU노드만, 2노드에 anti-affinity→최대 2레플→1레플 스케줄링 불가. GPU노드1: 추론1(32GB+4CPU+1GPU)→잔여 31.5GB,11.5CPU,1GPU. GPU노드2: 추론1→동일. 배치ML학습: GPU 1+64GB+8CPU→GPU노드 잔여 31.5GB<64GB→불가. 스케줄링 불가. API서버(6레플): 무중단→스팟 제외→CPU노드4대+GPU노드2대. anti-affinity 바람직. CPU노드4+GPU노드2=6노드에 1개씩 배치 가능. 데이터전처리(4레플): 중단 허용→스팟 가능. 스팟3+CPU노드1. 결론: ML추론 1레플, 배치ML학습 스케줄링 불가."
