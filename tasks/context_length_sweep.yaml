name: 컨텍스트 길이별 VRAM/품질 변화
description: |
  동일 모델에 컨텍스트 길이를 단계적으로 늘려가며
  VRAM 사용량, 생성 속도, 품질 변화를 측정한다.
  짧은 컨텍스트 → 긴 컨텍스트 순서로 실행.
type: qa_with_context
evaluator: llm_judge
judge_criteria: faithfulness

inputs:
  # ~100 토큰 컨텍스트 (짧음)
  - context: "파이썬은 1991년 발표된 프로그래밍 언어이다."
    question: "파이썬은 언제 발표되었나요?"
    reference: "1991년"

  # ~300 토큰 컨텍스트 (중간)
  - context: |
      쿠버네티스(Kubernetes)는 컨테이너화된 애플리케이션의 배포, 확장, 관리를 자동화하는 오픈소스 플랫폼이다.
      구글이 내부 시스템 Borg에서 얻은 경험을 기반으로 2014년 오픈소스로 공개했다.
      파드(Pod), 디플로이먼트(Deployment), 서비스(Service) 등의 추상화 개념을 제공하며,
      선언적 설정 방식으로 원하는 상태를 정의하면 쿠버네티스가 이를 유지한다.
      현재 클라우드 네이티브 애플리케이션의 표준 인프라로 자리잡았다.
    question: "쿠버네티스의 세 가지 핵심 추상화 개념은 무엇인가요?"
    reference: "파드(Pod), 디플로이먼트(Deployment), 서비스(Service)"

  # ~800 토큰 컨텍스트 (긴)
  - context: |
      대규모 언어 모델(LLM)의 발전 과정을 살펴보면, 초기에는 RNN과 LSTM 기반 모델이 주류였다.
      2017년 구글이 발표한 트랜스포머 아키텍처가 전환점이 되었으며, 이후 BERT(2018), GPT-2(2019),
      GPT-3(2020), PaLM(2022), GPT-4(2023), Llama(2023), Llama 2(2023), Llama 3(2024) 등이 등장했다.

      모델 크기도 급격히 증가하여 GPT-2는 15억 파라미터, GPT-3는 1750억, PaLM은 5400억,
      GPT-4는 추정 1조 이상의 파라미터를 가진 것으로 알려져 있다.

      동시에 효율화 연구도 활발히 진행되어, 양자화(Quantization), 증류(Distillation),
      LoRA 등의 기법으로 소형 모델에서도 대형 모델에 근접하는 성능을 달성하고 있다.
      특히 4비트 양자화(Q4_K_M)는 원본 대비 75% 이상 모델 크기를 줄이면서도
      벤치마크 성능 저하가 5% 미만인 경우가 많다.

      오픈소스 진영에서는 Meta의 Llama 시리즈, Mistral AI의 Mistral/Mixtral,
      알리바바의 Qwen 시리즈가 두각을 나타내고 있으며, 7B~70B 규모의 모델들이
      소비자용 GPU에서도 실행 가능해지면서 로컬 AI의 시대가 열리고 있다.
    question: "4비트 양자화(Q4_K_M)의 모델 크기 감소율과 벤치마크 성능 저하는 각각 얼마인가요?"
    reference: "크기 75% 이상 감소, 성능 저하 5% 미만"

  # ~1500 토큰 컨텍스트 (매우 긴)
  - context: |
      홈서버 구축 가이드: 하드웨어에서 소프트웨어까지

      1. 하드웨어 선택
      홈서버용 하드웨어는 목적에 따라 크게 달라진다. NAS 용도라면 저전력 CPU(Intel N100 등)와
      HDD 여러 대가 적합하고, AI 추론 서버라면 GPU(RTX 4070 이상)와 충분한 RAM(32GB+)이 필요하다.
      전력 소비는 월 전기료에 직결되므로, 유휴 시 50W 이하를 권장한다.

      2. 운영체제
      Ubuntu Server LTS가 가장 많이 선택되며, Proxmox VE를 사용하면 가상화 기반으로
      여러 서비스를 격리할 수 있다. 최근에는 Unraid, TrueNAS도 인기가 높다.

      3. 컨테이너화
      Docker와 Docker Compose는 홈서버의 필수 도구다. 각 서비스를 컨테이너로 격리하면
      의존성 충돌 없이 수십 개의 서비스를 동시에 운영할 수 있다.
      Portainer를 설치하면 웹 UI로 컨테이너를 관리할 수 있다.

      4. 필수 서비스
      - Nginx Proxy Manager: 리버스 프록시 + SSL 인증서 자동 갱신
      - Cloudflare Tunnel: 포트 포워딩 없이 외부 접속 (보안적으로 권장)
      - Uptime Kuma: 서비스 모니터링 + 알림
      - Grafana + Prometheus: 시스템 메트릭 시각화
      - Watchtower: Docker 이미지 자동 업데이트

      5. 백업 전략
      3-2-1 규칙을 따른다: 3개의 복사본, 2가지 미디어, 1개 오프사이트.
      Borg Backup이나 Restic을 cronjob으로 설정하여 자동 백업을 구현한다.

      6. 보안
      SSH 키 인증만 허용, fail2ban 설치, UFW 방화벽 설정, 불필요한 포트 닫기.
      Cloudflare Tunnel 사용 시 직접적인 포트 노출이 없어 공격 표면이 크게 줄어든다.

      7. AI 서비스 운영
      Ollama를 설치하면 로컬 LLM을 쉽게 실행할 수 있다. Open WebUI를 프론트엔드로 연결하면
      ChatGPT와 유사한 웹 인터페이스를 사용할 수 있다. GPU가 있는 경우 NVIDIA Container Toolkit을
      설치하여 Docker 컨테이너에서 GPU를 사용할 수 있다.
    question: "홈서버 백업의 3-2-1 규칙이란 무엇인가요?"
    reference: "3개의 복사본, 2가지 미디어, 1개 오프사이트"
