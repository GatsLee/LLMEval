name: 멀티홉 추론 능력 테스트
description: |
  2~3개 사실을 결합하거나 계산이 필요한 복합 추론 문제.
  단순 검색이 아닌 논리적 연결/계산 능력을 평가한다.
type: qa_with_context
evaluator: llm_judge
judge_criteria: correctness

inputs:
  - context: |
      [서버 배포 일정]
      - 빌드 시간: 평균 4분 30초
      - 단위 테스트: 평균 2분 15초
      - 통합 테스트: 평균 6분
      - 스테이징 배포: 3분
      - 스모크 테스트: 1분 30초
      - 프로덕션 배포: 5분
      단위 테스트와 통합 테스트는 빌드 완료 후 병렬 실행 가능.
      스테이징 배포는 모든 테스트 통과 후 실행.
      스모크 테스트 통과 후 프로덕션 배포.
    question: "전체 배포 파이프라인의 최소 소요 시간은 얼마인가요? 병렬 실행 가능한 단계를 고려하여 계산하세요."
    reference: "빌드(4:30) + 테스트 병렬(6:00) + 스테이징(3:00) + 스모크(1:30) + 프로덕션(5:00) = 20분"

  - context: |
      [마이크로서비스 아키텍처]
      서비스 A → 서비스 B: 평균 지연 15ms
      서비스 B → 서비스 C: 평균 지연 25ms
      서비스 B → 서비스 D: 평균 지연 10ms (C와 병렬 호출)
      서비스 C → 서비스 E: 평균 지연 20ms
      서비스 D → 서비스 E: 평균 지연 30ms
      서비스 E → 응답 반환: 5ms
      각 서비스의 내부 처리 시간은 무시한다.
      B에서 C와 D는 동시에 호출되며, E는 C와 D 모두의 응답을 받아야 처리한다.
    question: "클라이언트가 서비스 A에 요청을 보내면 전체 응답까지 최소 지연 시간은? 크리티컬 패스를 설명하세요."
    reference: "A→B(15) + max(B→C→E(25+20), B→D→E(10+30))(45) + E→응답(5) = 65ms. 크리티컬 패스: A→B→C→E→응답 또는 A→B→D→E→응답 (둘 다 동일한 45ms)"

  - context: |
      [데이터 파이프라인 용량 계획]
      - 일일 로그 유입량: 50GB
      - Kafka 파티션: 6개, 각 파티션 처리량 15MB/s
      - Spark 배치 처리: 압축 후 데이터 크기 원본의 30%
      - 최종 저장소(S3): 압축 데이터 저장, 90일 보존
      - 인덱스 오버헤드: 압축 데이터의 10%
    question: "90일 보존 시 S3에 필요한 총 저장 용량은? 인덱스 포함하여 계산하세요."
    reference: "일일 압축: 50GB × 30% = 15GB, 인덱스: 15GB × 10% = 1.5GB, 일일 합계: 16.5GB, 90일: 16.5 × 90 = 1,485GB ≈ 1.5TB"

  - context: |
      [쿠버네티스 리소스 관리]
      노드 3대: 각 16GB RAM, 8 CPU
      시스템 예약: 노드당 RAM 2GB, CPU 1
      DaemonSet(모니터링): 노드당 RAM 512MB, CPU 0.5
      Pod A: RAM 2GB, CPU 1 (레플리카 4)
      Pod B: RAM 4GB, CPU 2 (레플리카 2)
      Pod C: RAM 1GB, CPU 0.5 (레플리카 6)
      HPA가 Pod A를 최대 8 레플리카까지 스케일링할 수 있다.
    question: "현재 리소스 사용률(RAM, CPU)을 계산하고, Pod A가 8 레플리카로 스케일 아웃될 경우 리소스가 충분한지 판단하세요."
    reference: "가용: RAM (16-2-0.5)×3=40.5GB, CPU (8-1-0.5)×3=19.5. 현재: RAM 4×2+2×4+6×1=22GB, CPU 4×1+2×2+6×0.5=11. Pod A 8레플리카: RAM +8GB=30GB, CPU +4=15. 가용 범위 내 충분."

  - context: |
      [API 레이트 리미터 설계]
      요구사항:
      - 무료 티어: 100 req/min, 버스트 허용 최대 20 req/sec
      - 프로 티어: 1000 req/min, 버스트 허용 최대 100 req/sec
      - 엔터프라이즈: 10000 req/min, 버스트 제한 없음
      현재 트래픽:
      - 무료 사용자 10,000명 (평균 30 req/min)
      - 프로 사용자 500명 (평균 200 req/min)
      - 엔터프라이즈 10명 (평균 5000 req/min)
      Redis 키 하나당 약 100바이트 메모리 사용.
      슬라이딩 윈도우 방식: 사용자당 2개 키 필요.
    question: "전체 시스템의 분당 총 요청 수와 Redis 메모리 사용량을 추정하세요."
    reference: "총 요청: 10000×30 + 500×200 + 10×5000 = 300000+100000+50000 = 450,000 req/min. Redis: (10000+500+10)×2키×100바이트 = 10510×200 = 약 2.1MB"

  - context: |
      [로드 밸런서 가중치 라우팅]
      서버 A: 8 CPU, 32GB RAM, 가중치 4
      서버 B: 4 CPU, 16GB RAM, 가중치 2
      서버 C: 2 CPU, 8GB RAM, 가중치 1
      총 트래픽: 14,000 req/sec
      각 요청의 평균 CPU 사용: 0.5ms
      각 요청의 평균 메모리: 2MB (피크)
    question: "가중치 기반으로 각 서버가 받는 초당 요청 수를 계산하고, 서버 C의 CPU 사용률과 메모리 사용률을 추정하세요."
    reference: "총 가중치 7. A: 8000, B: 4000, C: 2000 req/sec. 서버 C CPU: 2000×0.5ms=1000ms/sec=1코어 사용→2CPU 중 50%. 메모리: 2000×2MB=4GB 피크→8GB 중 50%."
