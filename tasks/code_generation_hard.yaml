name: 코드 생성 고난도 테스트
description: |
  복합 요구사항이 있는 코드 생성 태스크.
  동시에 여러 제약 조건을 만족해야 하므로
  모델의 코드 품질과 지시 준수 능력을 평가한다.
type: qa_with_context
evaluator: llm_judge
judge_criteria: compliance

inputs:
  - context: |
      요구사항: Python LRU 캐시 구현
      - collections.OrderedDict 또는 dict만 사용 (functools 금지)
      - get(key)과 put(key, value) 모두 O(1)
      - capacity 초과 시 가장 오래된 항목 제거
      - type hint 필수
      - 스레드 안전(threading.Lock 사용)
      - __repr__로 현재 캐시 상태 출력 가능
    question: "위 모든 요구사항을 만족하는 LRUCache 클래스를 구현하세요."
    reference: "OrderedDict 기반 LRU, O(1) get/put, capacity eviction, type hint, Lock, __repr__ 모두 구현"

  - context: |
      다음 SQL 쿼리를 SQLAlchemy ORM으로 변환하세요.

      ```sql
      SELECT
        u.name,
        COUNT(o.id) AS order_count,
        COALESCE(SUM(o.total), 0) AS total_spent
      FROM users u
      LEFT JOIN orders o ON u.id = o.user_id
        AND o.created_at >= '2024-01-01'
        AND o.status != 'cancelled'
      WHERE u.is_active = TRUE
      GROUP BY u.id, u.name
      HAVING COUNT(o.id) >= 3
      ORDER BY total_spent DESC
      LIMIT 10;
      ```

      조건:
      - SQLAlchemy 2.0 스타일 (select() 함수)
      - User, Order 모델은 이미 정의되어 있다고 가정
      - 날짜는 파라미터로 받을 것
      - 실행 가능한 완전한 함수로 작성
    question: "위 SQL을 SQLAlchemy 2.0 ORM 쿼리로 변환하세요."
    reference: "select() + join(onclause) + func.count + func.coalesce + group_by + having + order_by + limit, 날짜 파라미터화"

  - context: |
      FastAPI 엔드포인트 구현 요구사항:
      - POST /api/files/upload
      - 다중 파일 업로드 지원 (최대 5개)
      - 파일당 최대 10MB
      - 허용 확장자: .pdf, .docx, .txt, .csv
      - 파일명에 UUID 접두사 추가하여 저장
      - 업로드 결과를 JSON으로 반환 (파일명, 크기, 저장 경로)
      - 에러 시 적절한 HTTP 상태 코드와 메시지
      - Pydantic 응답 모델 정의
    question: "위 요구사항을 모두 만족하는 FastAPI 엔드포인트를 구현하세요."
    reference: "UploadFile 다중 처리 + 크기/확장자 검증 + UUID 파일명 + Pydantic 응답 모델 + HTTPException 에러 처리"

  - context: |
      다음 docker-compose.yml을 리뷰하고 문제점을 찾으세요:

      ```yaml
      version: "3"
      services:
        web:
          build: .
          ports:
            - "80:80"
          environment:
            - DB_PASSWORD=supersecret123
            - DEBUG=true
          volumes:
            - .:/app
          depends_on:
            - db
          restart: always

        db:
          image: postgres:latest
          volumes:
            - pgdata:/var/lib/postgresql/data
          environment:
            - POSTGRES_PASSWORD=supersecret123

        redis:
          image: redis
          ports:
            - "6379:6379"

      volumes:
        pgdata:
      ```
    question: |
      이 docker-compose.yml의 보안, 안정성, 모범 사례 관점에서
      문제점을 최소 5가지 찾고, 각각의 수정 방법을 제시하세요.
    reference: "비밀번호 하드코딩(→secrets/env_file), DEBUG=true, :latest 태그, redis 포트 노출, healthcheck 미설정 등 5가지 이상"

  - context: |
      Python 데코레이터 구현 요구사항:
      @retry 데코레이터를 만드세요.
      - max_retries: 최대 재시도 횟수 (기본 3)
      - delay: 재시도 간 대기 시간(초) (기본 1.0)
      - backoff: 지수 백오프 배율 (기본 2.0)
      - exceptions: 재시도할 예외 타입 튜플 (기본 Exception)
      - on_retry: 재시도 시 호출할 콜백 함수 (선택)
      - 동기/비동기 함수 모두 지원
      - 원본 함수의 시그니처와 docstring 보존 (functools.wraps)
      - 로깅: 재시도 시 시도 횟수와 예외 정보 출력
    question: "위 모든 요구사항을 만족하는 @retry 데코레이터를 구현하세요."
    reference: "파라미터화 데코레이터 + 지수 백오프 + 예외 필터 + async 지원(asyncio.iscoroutinefunction) + wraps + 콜백 + 로깅"
