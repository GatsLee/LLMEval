name: 지시사항 스트레스 테스트 (5단계)
description: |
  지시사항 1개(L1)부터 12개 동시 제약(L5)까지 점진적 복잡도.
  모델이 여러 조건을 동시에 만족하는 능력의 한계를 측정한다.
type: instruction_following
evaluator: llm_judge
judge_criteria: compliance

inputs:
  # ── L1: 제약 1개 ──
  - instruction: "[L1] 인공지능의 정의를 한 문장으로 설명하세요."
    constraints: "반드시 한 문장으로만 답하세요."
    reference: "인공지능은 인간의 지능을 모방하여 학습, 추론, 판단을 수행하는 컴퓨터 시스템이다."

  - instruction: "[L1] Python의 장점을 3가지 나열하세요."
    constraints: "번호 목록(1. 2. 3.)으로 작성하세요."
    reference: "1. 간결한 문법 2. 풍부한 라이브러리 3. 크로스 플랫폼"

  # ── L2: 제약 3개 동시 ──
  - instruction: "[L2] Kubernetes의 핵심 개념을 설명하세요."
    constraints: |
      1) 정확히 5문장으로 작성
      2) 각 문장을 '•' 기호로 시작
      3) 'Pod', 'Service', 'Deployment' 세 단어를 반드시 포함
    reference: "• Kubernetes는 컨테이너 오케스트레이션 플랫폼이다. • Pod은 가장 작은 배포 단위이다. • Service는 Pod에 대한 네트워크 접근을 제공한다. • Deployment는 Pod의 선언적 업데이트를 관리한다. • 이를 통해 대규모 분산 시스템을 효율적으로 운영할 수 있다."

  - instruction: "[L2] REST API 설계 원칙을 설명하세요."
    constraints: |
      1) 영어 단어를 절대 사용하지 마세요 (기술 용어도 한글로)
      2) 비유를 하나 이상 사용
      3) 150자 이내로 작성
    reference: "자원 기반 설계는 도서관처럼 각 자료에 고유 주소를 부여하고, 정해진 동작으로 자료를 조회·생성·수정·삭제하는 원칙입니다."

  # ── L3: 제약 5개 동시 ──
  - instruction: "[L3] 도커(Docker)의 장단점을 비교 분석하세요."
    constraints: |
      1) 마크다운 표 형식으로 작성 (| 장점 | 단점 |)
      2) 장점과 단점을 각각 정확히 4개씩 나열
      3) 각 항목은 10단어 이내
      4) 마지막에 한 줄 결론 추가
      5) 전체 응답에서 '좋다', '나쁘다' 단어 사용 금지
    reference: "| 장점 | 단점 | 환경 일관성 보장 | 학습 곡선 존재 | 빠른 배포 | 보안 격리 불완전 | 리소스 효율적 | 상태 관리 복잡 | 마이크로서비스 적합 | 네트워크 구성 복잡 | 결론: 도커는 마이크로서비스에 적합하나 운영 복잡도를 고려해야 한다."

  - instruction: "[L3] 머신러닝 모델 학습 파이프라인을 설명하세요."
    constraints: |
      1) 단계별 번호(Step 1, Step 2...)로 작성
      2) 각 단계에 소요 예상 시간을 괄호로 표기 (예: (2시간))
      3) 총 5단계로 구성
      4) 각 단계 설명은 정확히 2문장
      5) '데이터', '모델', '평가' 단어를 각각 최소 2회 사용
    reference: "Step 1. 데이터 수집 (4시간) - 학습용 데이터를 수집한다. 데이터 품질을 점검한다. Step 2..."

  # ── L4: 제약 8개 동시 ──
  - instruction: "[L4] 소프트웨어 아키텍처 패턴(MVC, 마이크로서비스, 이벤트 기반)을 비교하세요."
    constraints: |
      1) 정확히 3개 섹션 (각 패턴당 1개)
      2) 각 섹션 제목을 '## 패턴이름' 형식으로
      3) 각 섹션에 '적합한 경우:', '부적합한 경우:' 소제목 필수
      4) 각 소제목 아래 정확히 2개 항목을 '-' 목록으로
      5) 모든 항목은 한국어로, 영어 약어 사용 금지 (MVC → 모델-뷰-컨트롤러)
      6) 전체 응답에 수치 데이터 3개 이상 포함 (예: 팀원 수, 처리량)
      7) 마지막에 추천 의사결정 트리를 텍스트로 표현
      8) 총 단어 수 200~300 사이 (한국어 기준 어절)
    reference: "## 모델-뷰-컨트롤러 적합: 10인 이하 팀 웹앱. 부적합: 실시간 처리. ## 마이크로서비스..."

  - instruction: "[L4] 데이터베이스 인덱싱 전략을 실무 관점에서 설명하세요."
    constraints: |
      1) Q&A 형식 (Q: 질문 A: 답변)으로 정확히 4쌍 작성
      2) 첫 글자 제약: 각 답변의 첫 글자가 'ㄱ', 'ㄴ', 'ㄷ', 'ㄹ'로 시작
      3) 각 답변에 SQL 코드 예시 1개씩 포함 (인라인 코드 블록)
      4) 'SELECT', 'INDEX' 키워드 각각 최소 3회 사용
      5) 실행 시간 비교 수치 2개 이상 포함
      6) 마지막에 '핵심 정리:' 섹션 추가
      7) '핵심 정리'는 정확히 3개 불릿 포인트
      8) 전체 응답에 이모지 사용 금지
    reference: "Q: B트리 인덱스란? A: 균형 트리 구조로 데이터를 정렬하여 검색 속도를 높인다..."

  # ── L5: 제약 12개 동시 (극한) ──
  - instruction: "[L5] MLOps 파이프라인 설계 제안서를 작성하세요."
    constraints: |
      1) 전체 구조: 제목 → 개요 → 아키텍처 → 비용 → 일정 → 결론
      2) 제목은 '[]' 대괄호로 감싸기
      3) 각 섹션은 '---' 구분선으로 분리
      4) '개요' 섹션: 정확히 3문장, 각 문장 마침표 전에 근거 수치 1개
      5) '아키텍처' 섹션: ASCII 다이어그램 1개 포함 (화살표 →, 박스 [] 사용)
      6) '비용' 섹션: 마크다운 표로 항목별 월 비용 표시, 합계 행 포함
      7) '일정' 섹션: 주 단위 간트 차트 텍스트 표현 (W1~W8)
      8) 모든 기술 스택 언급 시 버전 명시 (예: Python 3.11)
      9) 영어 기술 용어 사용 시 첫 등장에 한글 괄호 설명 (예: CI/CD(지속적 통합/배포))
      10) '결론' 섹션: 장점 3개 + 리스크 2개를 각각 번호 목록으로
      11) 전체 응답에서 '것입니다', '있습니다' 종결어미 사용 금지 (간결체 사용)
      12) 총 응답 길이: 400~600 어절
    reference: "[MLOps 파이프라인 설계안] --- 개요: 본 시스템은 일 100만 건 추론을 처리한다..."

  - instruction: "[L5] 기술 면접 모의 답변을 작성하세요. 주제: '대규모 트래픽 처리 아키텍처'"
    constraints: |
      1) 답변 구조: 핵심결론 → 상세설명 → 경험 사례 → 트레이드오프
      2) '핵심결론'은 정확히 1문장, 20단어 이내
      3) '상세설명'은 정확히 5개 번호 항목, 각 항목 2문장
      4) '경험 사례'는 STAR 형식 (상황/과제/행동/결과 각 1~2문장)
      5) '트레이드오프'는 2×2 표 (접근법 × 장단점)
      6) 초당 요청 수, 응답시간, 가용성 수치를 각각 1회 이상 언급
      7) CAP 정리와 PACELC 정리를 반드시 언급
      8) 기술 스택 최소 5개 언급 (각각 사용 목적 포함)
      9) 비유를 2개 이상 사용
      10) 마지막에 면접관 예상 후속 질문 2개 작성
      11) 각 섹션 사이에 빈 줄 1개만 사용 (2개 이상 금지)
      12) '~합니다' 존댓말 사용, 단 '경험 사례' 섹션만 '~했다' 과거형
    reference: "핵심결론: 대규모 트래픽은 수평 확장과 캐싱 계층화로 해결합니다..."
