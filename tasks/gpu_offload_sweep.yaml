name: GPU 오프로딩 속도/품질 비교
description: |
  동일 모델을 num_gpu 설정별로 실행하여 GPU↔CPU 오프로딩이
  속도(t/s), TTFT, VRAM/RAM 사용량, 품질에 미치는 영향을 측정한다.
  사용법:
    python eval.py run -t tasks/gpu_offload_sweep.yaml -m llama3.1:8b --num-gpu 99 -d "full GPU"
    python eval.py run -t tasks/gpu_offload_sweep.yaml -m llama3.1:8b --num-gpu 0 -d "CPU only"
    python eval.py compare <run_a> <run_b>
type: qa_with_context
evaluator: llm_judge
judge_criteria: faithfulness

inputs:
  - context: |
      리눅스의 파일 시스템 계층 구조(FHS)는 다음과 같다:
      /bin - 필수 바이너리, /etc - 시스템 설정 파일, /home - 사용자 홈 디렉터리,
      /var - 가변 데이터(로그 등), /tmp - 임시 파일, /usr - 사용자 프로그램,
      /opt - 선택적 소프트웨어, /proc - 가상 프로세스 파일시스템,
      /dev - 장치 파일, /mnt - 임시 마운트 포인트.
    question: "/var 디렉터리의 용도와 /tmp 디렉터리의 용도를 각각 설명하세요."
    reference: "/var는 가변 데이터(로그 등) 저장, /tmp는 임시 파일 저장"

  - context: |
      OSI 7계층 모델은 네트워크 통신을 7개 계층으로 분리한다:
      1층 물리(Physical) - 전기 신호 전송
      2층 데이터링크(Data Link) - MAC 주소 기반 프레임 전달
      3층 네트워크(Network) - IP 주소 기반 라우팅
      4층 전송(Transport) - TCP/UDP 포트 기반 종단간 통신
      5층 세션(Session) - 연결 관리
      6층 표현(Presentation) - 데이터 인코딩/암호화
      7층 응용(Application) - HTTP, FTP 등 사용자 서비스
    question: "3층과 4층의 역할과 사용하는 주소 체계를 비교 설명하세요."
    reference: "3층 네트워크는 IP 주소 기반 라우팅, 4층 전송은 포트 기반 종단간 통신(TCP/UDP)"

  - context: |
      Docker 컨테이너의 네트워킹 모드는 4가지가 있다:
      bridge(기본) - 가상 브릿지 네트워크로 컨테이너 격리, 포트 매핑 필요.
      host - 호스트 네트워크 직접 사용, 포트 매핑 불필요, 격리 없음.
      none - 네트워크 비활성화, 완전 격리.
      overlay - 여러 Docker 호스트 간 통신(Swarm 모드).
      macvlan - 컨테이너에 MAC 주소 부여, 물리 네트워크 직접 연결.
    question: "bridge 모드와 host 모드의 차이점을 격리성과 포트 매핑 관점에서 설명하세요."
    reference: "bridge는 가상 브릿지로 격리되어 포트 매핑 필요, host는 호스트 네트워크 직접 사용하여 격리 없고 포트 매핑 불필요"

  - context: |
      Git의 브랜치 전략 중 Git Flow는 다음 브랜치를 사용한다:
      main - 프로덕션 배포 코드, develop - 개발 통합 브랜치,
      feature/* - 기능 개발, release/* - 릴리스 준비 및 QA,
      hotfix/* - 긴급 버그 수정(main에서 분기).
      Trunk-Based Development는 main 브랜치 하나에 직접 커밋하며
      feature flag로 미완성 기능을 제어한다.
      GitHub Flow는 main + feature 브랜치만 사용하는 간소화된 모델이다.
    question: "Git Flow에서 hotfix 브랜치는 어디서 분기하고 어디로 머지하나요? Trunk-Based Development와의 핵심 차이점은?"
    reference: "hotfix는 main에서 분기하여 main과 develop에 머지. Trunk-Based는 main에 직접 커밋하며 feature flag로 제어하는 것이 핵심 차이"
