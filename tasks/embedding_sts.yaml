name: 임베딩 의미 유사도 평가 (STS)
description: |
  텍스트 쌍의 코사인 유사도와 사람의 유사도 점수를 비교.
  Spearman 상관계수로 임베딩 모델의 의미 포착 능력을 측정한다.
  사용법:
    python eval.py run -t tasks/embedding_sts.yaml -m nomic-embed-text,mxbai-embed-large
type: embedding_sts
evaluator: embedding_sts

inputs:
  # 높은 유사도 (0.8~1.0)
  - text_a: "오늘 날씨가 매우 좋다"
    text_b: "오늘은 화창한 하루다"
    human_score: 0.90

  - text_a: "Python은 배우기 쉬운 프로그래밍 언어이다"
    text_b: "파이썬은 초보자에게 적합한 코딩 언어이다"
    human_score: 0.92

  - text_a: "GPU는 대규모 병렬 연산에 최적화되어 있다"
    text_b: "그래픽 카드는 많은 연산을 동시에 처리하는 데 뛰어나다"
    human_score: 0.88

  - text_a: "서울은 대한민국의 수도이다"
    text_b: "한국의 수도는 서울이다"
    human_score: 0.95

  # 중간 유사도 (0.4~0.7)
  - text_a: "Docker 컨테이너로 애플리케이션을 배포한다"
    text_b: "Kubernetes는 컨테이너 오케스트레이션 플랫폼이다"
    human_score: 0.55

  - text_a: "머신러닝 모델을 학습시키려면 데이터가 필요하다"
    text_b: "딥러닝은 인공 신경망을 사용한 기계 학습의 한 분야이다"
    human_score: 0.60

  - text_a: "리눅스는 오픈소스 운영체제이다"
    text_b: "우분투 서버를 설치하여 웹 서버를 구축했다"
    human_score: 0.50

  - text_a: "커피를 마시면 집중력이 높아진다"
    text_b: "카페인은 중추신경계를 자극하는 물질이다"
    human_score: 0.55

  - text_a: "한국어는 교착어에 속한다"
    text_b: "일본어와 한국어는 문법 구조가 유사하다"
    human_score: 0.45

  # 낮은 유사도 (0.0~0.3)
  - text_a: "고양이가 매트 위에 앉아있다"
    text_b: "주식 시장이 크게 하락했다"
    human_score: 0.05

  - text_a: "PostgreSQL은 관계형 데이터베이스이다"
    text_b: "오늘 점심으로 김치찌개를 먹었다"
    human_score: 0.03

  - text_a: "트랜스포머 아키텍처는 셀프 어텐션을 사용한다"
    text_b: "축구 월드컵은 4년마다 개최된다"
    human_score: 0.02

  - text_a: "REST API는 HTTP 메서드를 사용한다"
    text_b: "봄에는 벚꽃이 아름답게 핀다"
    human_score: 0.03

  # 의미적 반대/부정 (낮은 유사도지만 같은 도메인)
  - text_a: "이 코드는 매우 효율적이다"
    text_b: "이 코드는 성능이 매우 나쁘다"
    human_score: 0.30

  - text_a: "GPU는 추론 속도를 크게 향상시킨다"
    text_b: "CPU만으로는 대규모 모델 추론이 매우 느리다"
    human_score: 0.50

  # 패러프레이즈 (같은 의미, 다른 표현)
  - text_a: "Ollama를 사용하면 로컬에서 LLM을 실행할 수 있다"
    text_b: "로컬 환경에서 대규모 언어 모델을 실행하려면 Ollama를 활용하면 된다"
    human_score: 0.93

  - text_a: "양자화를 적용하면 모델 크기가 줄어든다"
    text_b: "Quantization은 모델의 파라미터를 저비트로 변환하여 용량을 감소시킨다"
    human_score: 0.85

  # 영어 쌍 (다국어 임베딩 능력 테스트)
  - text_a: "The transformer architecture revolutionized NLP"
    text_b: "트랜스포머 아키텍처는 자연어 처리를 혁신했다"
    human_score: 0.90

  - text_a: "Docker containers provide application isolation"
    text_b: "Docker 컨테이너는 애플리케이션 격리를 제공한다"
    human_score: 0.92
