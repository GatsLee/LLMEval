name: 장문 컨텍스트 정보 추출 스트레스 (5단계)
description: |
  짧은 컨텍스트(L1, ~100단어)부터 매우 긴 컨텍스트(L5, ~2000단어)까지.
  컨텍스트가 길어질수록 핵심 정보를 찾아 정확히 추출하는 능력을 측정.
  정답은 항상 컨텍스트 중간~후반부에 매립되어 있다.
type: qa_with_context
evaluator: llm_judge
judge_criteria: correctness

inputs:
  # ── L1: ~100단어 컨텍스트 ──
  - context: |
      2024년 1분기 보고서에 따르면, A사의 매출은 전년 대비 15% 성장한 4,200억 원을 기록했다. 영업이익률은 12.3%이며, 신규 고객 수는 23,000명이다. R&D 투자는 전체 매출의 8%를 차지한다.
    question: "[L1] A사의 R&D 투자 금액은 얼마인가요?"
    reference: "4,200억 × 8% = 336억 원"

  - context: |
      프로젝트 알파의 일정: 기획 2주, 개발 8주, QA 3주, 배포 1주. 총 14주 예정이며, 4월 1일 착수했다. 개발팀은 5명이고 QA팀은 2명이다. 예산은 3.5억 원이다.
    question: "[L1] 프로젝트 알파의 예상 완료일은?"
    reference: "4월 1일 + 14주 = 7월 8일경"

  # ── L2: ~300단어 컨텍스트 (방해 정보 포함) ──
  - context: |
      [반기 인사 평가 가이드라인]
      평가 등급은 S(최우수), A(우수), B(보통), C(미흡), D(부진)로 나뉜다. 각 등급의 비율은 S 5%, A 20%, B 50%, C 20%, D 5%로 강제 배분한다.

      평가 항목은 업무 성과(40%), 역량(30%), 협업(20%), 자기개발(10%)이다. 각 항목은 1~5점 척도로 평가하며, 가중 합산하여 최종 점수를 산출한다.

      보너스 산정: S등급 기본급의 200%, A등급 150%, B등급 100%, C등급 50%, D등급 0%.

      특별 조항: 분기 내 특허 출원 시 평가 점수에 0.3점 가산. 고객 불만 3건 이상 시 최종 등급에서 1단계 하향.

      현재 팀원 현황:
      - 김영수: 성과 4.5, 역량 3.8, 협업 4.2, 자기개발 3.0, 특허 1건
      - 이민지: 성과 3.2, 역량 4.5, 협업 4.8, 자기개발 4.5, 고객불만 0건
      - 박준호: 성과 4.8, 역량 4.0, 협업 2.5, 자기개발 3.5, 고객불만 4건
    question: "[L2] 박준호의 최종 가중 점수를 계산하고, 특별 조항 적용 후 예상 등급을 판단하세요."
    reference: "가중 점수: 4.8×0.4 + 4.0×0.3 + 2.5×0.2 + 3.5×0.1 = 1.92+1.20+0.50+0.35 = 3.97. 특허 없으므로 가산 없음. 고객불만 4건≥3 → 1단계 하향. 3.97점은 A등급(상위 25%)권이나 하향 적용 → B등급."

  - context: |
      [서버 모니터링 대시보드 — 2024.03.15 14:00 스냅샷]

      웹서버 클러스터 (4대):
      web-01: CPU 45%, RAM 62%, 디스크 78%, 요청 1,200/s, 에러율 0.1%
      web-02: CPU 38%, RAM 55%, 디스크 45%, 요청 1,100/s, 에러율 0.05%
      web-03: CPU 92%, RAM 88%, 디스크 90%, 요청 800/s, 에러율 2.3%
      web-04: CPU 41%, RAM 60%, 디스크 50%, 요청 1,150/s, 에러율 0.08%

      DB 클러스터:
      db-primary: CPU 55%, RAM 75%, 연결 수 450/500, 쿼리 지연 P99: 120ms
      db-replica-1: CPU 30%, RAM 60%, 연결 수 200/500, 쿼리 지연 P99: 45ms
      db-replica-2: CPU 28%, RAM 58%, 연결 수 180/500, 쿼리 지연 P99: 50ms

      Redis:
      redis-01: 메모리 4.2GB/8GB, 히트율 94%, 키 수 2.3M, 연결 수 120
      redis-02: 메모리 3.8GB/8GB, 히트율 91%, 키 수 1.9M, 연결 수 95

      경고 임계값: CPU>90%, RAM>85%, 디스크>85%, 에러율>1%, DB연결>90%, 쿼리P99>100ms
    question: "[L2] 현재 경고 상태인 서버/항목을 모두 찾고, 가장 긴급한 조치 대상을 우선순위화하세요."
    reference: "경고 대상: web-03 CPU 92%>90%, web-03 RAM 88%>85%, web-03 디스크 90%>85%, web-03 에러율 2.3%>1%, db-primary P99 120ms>100ms, db-primary 연결 450/500=90%. 우선순위: 1) web-03 (다중 임계 초과, 에러율 높음) 2) db-primary (연결 포화+지연 증가)"

  # ── L3: ~700단어 컨텍스트 (정답이 중간에 매립) ──
  - context: |
      [기술 기업 분석 리포트 — 2024년 상반기]

      1. 시장 개요
      글로벌 SaaS 시장은 2024년 상반기 기준 약 1,970억 달러 규모로, 전년 동기 대비 18% 성장했다. 특히 AI 기반 SaaS는 43% 성장률을 기록하며 전체 시장 성장을 견인했다.

      2. 주요 기업 분석

      [기업 A — CloudFirst]
      매출: 82억 달러 (전년 대비 +22%)
      ARR: 95억 달러
      순 고객 유지율(NDR): 135%
      직원 수: 12,400명
      주요 제품: 데이터 분석 플랫폼, 클라우드 보안
      R&D 비율: 매출의 25%
      최근 인수: DataViz Corp (2.3억 달러), SecureNet (4.1억 달러)

      [기업 B — InfraCore]
      매출: 56억 달러 (전년 대비 +15%)
      ARR: 61억 달러
      NDR: 118%
      직원 수: 8,900명
      주요 제품: 인프라 자동화, 모니터링
      R&D 비율: 매출의 19%
      최근 인수: MonitorPro (1.8억 달러)
      특이사항: CFO 교체 예정, 2024 Q3 구조조정 계획 발표. 감원 규모 약 700명(8%).

      [기업 C — AIScale]
      매출: 34억 달러 (전년 대비 +48%)
      ARR: 42억 달러
      NDR: 152%
      직원 수: 5,200명
      주요 제품: AI 개발 플랫폼, MLOps 솔루션
      R&D 비율: 매출의 38%
      최근 인수: GPUCloud (8.5억 달러) — GPU 클라우드 인프라 확보 목적
      특이사항: 시리즈 F 투자 12억 달러 유치, 기업 가치 180억 달러

      [기업 D — DevTools]
      매출: 28억 달러 (전년 대비 +12%)
      ARR: 30억 달러
      NDR: 105%
      직원 수: 6,100명
      주요 제품: 코드 협업, CI/CD
      R&D 비율: 매출의 22%
      최근 인수: 없음
      특이사항: 경쟁 심화로 성장 둔화, GitHub Copilot에 밀리는 추세

      3. 투자 관점 분석
      성장성 측면에서 기업 C(AIScale)가 가장 주목할 만하나, 적자폭도 크다(영업이익률 -15%). 기업 A(CloudFirst)는 안정적 성장과 수익성을 겸비. 기업 B(InfraCore)는 구조조정 리스크. 기업 D(DevTools)는 경쟁력 약화 우려.

      4. 핵심 수치 요약
      전체 4개 기업 합산 매출: 200억 달러
      전체 인수 합산: 16.7억 달러
      평균 R&D 비율: 26%
    question: "[L3] 기업 C(AIScale)의 R&D 투자 절대 금액과, 최근 인수 금액 대비 R&D 투자 비율을 계산하세요. 또한 기업 C의 영업이익 금액을 추정하세요."
    reference: "R&D 금액: 34억 × 38% = 12.92억 달러. 인수 금액: 8.5억 달러. R&D/인수 비율: 12.92/8.5 = 152%. 영업이익: 34억 × (-15%) = -5.1억 달러 (적자)."

  - context: |
      [소프트웨어 아키텍처 리뷰 회의록 — 2024.03.20]

      참석자: CTO 김태현, 백엔드 리드 이수진, 프론트 리드 최민우, DevOps 박서연, QA 리드 정하나

      안건 1: 모놀리스 → 마이크로서비스 전환 진행 상황
      현재 12개 서비스 중 7개 전환 완료. 남은 5개: 결제(Payment), 재고(Inventory), 알림(Notification), 리포트(Report), 레거시 인증(LegacyAuth). 결제 서비스가 가장 복잡하며, 외부 PG사 연동 4곳(이니시스, KG, 네이버페이, 카카오페이) 포함. 이수진 추정: 결제 전환에 8주 필요.

      안건 2: 데이터베이스 전략
      현재: 단일 PostgreSQL(primary + 2 replica). 전환 후: 서비스별 DB 분리 계획. 결제: 별도 PostgreSQL(PCI DSS 준수 필요). 재고: Redis + PostgreSQL(실시간 재고는 Redis, 영속 데이터는 PG). 알림: MongoDB(비정형 알림 템플릿 저장). 리포트: ClickHouse(분석용 OLAP).

      CTO 의견: 리포트 DB를 ClickHouse 대신 BigQuery 사용 검토. 비용 예측 필요.
      박서연: BigQuery 예상 비용 월 $3,200 vs ClickHouse 자체 운영 월 $1,800(인스턴스 비용만). 인건비 포함 시 ClickHouse 월 $4,500 추정(운영 인력 0.5명 × $5,400/월 = $2,700 추가).

      안건 3: API 게이트웨이 선택
      후보: Kong vs Envoy vs AWS API Gateway
      이수진: Kong 선호(플러그인 생태계). 최민우: Envoy 선호(gRPC 지원). 박서연: AWS API GW(관리 부담 최소화).
      결정: Kong을 1차 선택, Envoy는 내부 서비스 간 통신에 사이드카로 활용. AWS API GW는 비용 대비 기능 제한으로 탈락.

      안건 4: 테스트 전략
      정하나: 현재 테스트 커버리지 67%. 마이크로서비스 전환 시 통합 테스트 복잡도 급증 예상. 계약 테스트(Pact) 도입 제안. 예상 도입 기간 3주, 이후 통합 테스트 작성 시간 40% 절감 예상.
      CTO 승인: Pact 도입 진행.

      다음 회의: 2024.04.03, 결제 서비스 전환 설계 리뷰
    question: "[L3] ClickHouse 자체 운영과 BigQuery 중 어느 것이 더 비용 효율적인지 총비용으로 비교하고, 인건비를 포함한 연간 비용 차이를 계산하세요."
    reference: "BigQuery: 월 $3,200, 연 $38,400. ClickHouse(인건비 포함): 월 $4,500, 연 $54,000. BigQuery가 연 $15,600 절약. 단, ClickHouse 인스턴스만: 월 $1,800, 연 $21,600(BigQuery 대비 $16,800 절약). 인건비 포함 시 BigQuery가 저렴, 미포함 시 ClickHouse가 저렴."

  # ── L4: ~1200단어 (정답이 후반부에 매립, 다수 방해 정보) ──
  - context: |
      [분기별 기술 부채 현황 보고서 — 2024 Q1]

      1. 개요
      전사 기술 부채 지수(TDI)는 전분기 대비 12% 증가한 847포인트를 기록했다. 이는 3분기 연속 상승세이며, 급격한 비즈니스 성장에 따른 기능 우선 개발의 결과이다.

      2. 팀별 현황

      [플랫폼팀]
      TDI: 245 (+15% QoQ)
      주요 부채: 레거시 인증 모듈(LDAP 기반, Spring Security 2.x), 모놀리스 코어의 순환 의존성 38건
      위험도: 높음 — 인증 모듈 보안 패치 6개월 미적용
      해결 비용 추정: 개발자 2명 × 12주 = 24인주
      우선순위: P0

      [백엔드팀]
      TDI: 198 (+8% QoQ)
      주요 부채: API 응답 형식 불일치(v1/v2 혼재 엔드포인트 23개), 미사용 엔드포인트 47개, 로깅 표준 미준수 서비스 8개
      위험도: 중간
      해결 비용 추정: 개발자 1명 × 8주 = 8인주 (API 정리) + 1명 × 4주 = 4인주 (로깅 표준화)
      우선순위: P1

      [프론트엔드팀]
      TDI: 156 (-3% QoQ)
      주요 부채: React 클래스 컴포넌트 잔존(전체 312개 중 89개), CSS 모듈 미적용(인라인 스타일 34%), 번들 크기 4.2MB(목표 2MB)
      위험도: 낮음
      해결 비용 추정: 개발자 1명 × 6주 (클래스→함수 전환) + 1명 × 4주 (CSS 정리)
      우선순위: P2

      [데이터팀]
      TDI: 132 (+22% QoQ)
      주요 부채: ETL 파이프라인 에어플로우 1.x (EOL 경고), 데이터 검증 부재 테이블 67개/전체 234개, 중복 데이터 파이프라인 12건
      위험도: 높음 — 에어플로우 1.x 보안 취약점(CVE-2023-XXXXX)
      해결 비용 추정: 개발자 2명 × 10주 = 20인주 (에어플로우 2.x 마이그레이션) + 1명 × 8주 (데이터 검증 추가)
      우선순위: P0

      [DevOps팀]
      TDI: 116 (+5% QoQ)
      주요 부채: 수동 배포 잔여 서비스 4개/전체 28개, Terraform 상태 파일 분리 미완료(3개 환경 공유), 시크릿 관리 Vault 미적용 서비스 9개
      위험도: 중간
      해결 비용 추정: 1명 × 6주 (배포 자동화) + 1명 × 4주 (Terraform 분리) + 1명 × 3주 (Vault 적용)
      우선순위: P1

      3. 비용 분석
      전체 기술 부채 해결에 필요한 총 인력: 위 모든 항목 합산
      개발자 평균 주급: 280만 원
      기회비용: 기술 부채 미해결 시 분기당 장애 확률 23% 증가, 장애 1건당 평균 손실 1.2억 원

      4. 의사결정 매트릭스
      권장 순서: P0 우선 해결 → P1 → P2
      P0 항목: 플랫폼팀 인증 모듈(24인주), 데이터팀 에어플로우 마이그레이션(20인주) + 데이터 검증(8인주)
      P0 합계: 52인주
      P0 비용: 52인주 × 280만 원 = 14,560만 원

      5. 추가 컨텍스트
      CTO 예산 승인 한도: 분기 2억 원
      현재 가용 인력: 시니어 3명, 주니어 2명 (시니어 주급 350만 원, 주니어 210만 원)

      참고: 플랫폼팀 P0 작업은 시니어 필수(보안 관련), 데이터팀 에어플로우 마이그레이션은 시니어 1 + 주니어 1 조합 가능.
    question: "[L4] P0 항목을 모두 해결하는 최소 비용 인력 배치안을 세우세요. 시니어/주니어 주급 차이를 반영하고, CTO 예산 한도 내에 가능한지 판단하세요."
    reference: "플랫폼 P0: 시니어 2명 × 12주 = 24인주, 비용 = 2×12×350만 = 8,400만 원. 데이터 에어플로우: 시니어 1 + 주니어 1 × 10주 = 20인주, 비용 = (350+210)×10 = 5,600만 원. 데이터 검증: 주니어 1 × 8주, 비용 = 210×8 = 1,680만 원. 총: 시니어 3명+주니어 2명, 총비용 15,680만 원. 예산 2억 내 가능(여유 4,320만 원). 단, 시니어 3명 전원+주니어 2명 전원 투입 → 다른 작업 불가."

