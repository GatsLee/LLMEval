name: 임베딩 RAG 검색 정확도 평가
description: |
  쿼리에 대해 N개 후보 문서 중 정답을 올바르게 검색하는지 평가.
  Recall@1, Recall@3, MRR (Mean Reciprocal Rank)로 측정한다.
  사용법:
    python eval.py run -t tasks/embedding_retrieval.yaml -m nomic-embed-text,mxbai-embed-large
type: embedding_retrieval
evaluator: embedding_retrieval

inputs:
  - query: "파이썬에서 리스트를 정렬하는 방법"
    candidates:
      - "Python의 sorted() 함수와 list.sort() 메서드를 사용하면 리스트를 오름차순 또는 내림차순으로 정렬할 수 있다."
      - "JavaScript의 Array.sort()는 기본적으로 유니코드 문자열 정렬을 수행한다."
      - "데이터베이스의 ORDER BY 절을 사용하여 쿼리 결과를 정렬할 수 있다."
      - "Python의 딕셔너리는 키-값 쌍으로 데이터를 저장하는 자료구조이다."
    correct_idx: 0

  - query: "Docker 컨테이너의 포트 포워딩 설정"
    candidates:
      - "Kubernetes의 Service 리소스는 파드 간 통신을 관리한다."
      - "Nginx 리버스 프록시를 설정하여 요청을 백엔드 서버로 전달할 수 있다."
      - "Docker run 명령에서 -p 옵션을 사용하면 호스트와 컨테이너 간 포트를 매핑할 수 있다. 예: docker run -p 8080:80"
      - "방화벽 규칙을 설정하여 특정 포트의 인바운드 트래픽을 허용할 수 있다."
    correct_idx: 2

  - query: "GPU VRAM이 부족할 때 해결 방법"
    candidates:
      - "CPU 쿨러를 교체하면 발열 문제를 해결할 수 있다."
      - "모델 양자화(Quantization)를 적용하거나 num_gpu 옵션으로 일부 레이어를 RAM으로 오프로딩하면 VRAM 부족 문제를 완화할 수 있다."
      - "SSD를 NVMe로 업그레이드하면 데이터 로딩 속도가 향상된다."
      - "RAM을 64GB로 증설하면 전반적인 시스템 성능이 개선된다."
    correct_idx: 1

  - query: "한국어 자연어 처리 토크나이저 종류"
    candidates:
      - "형태소 분석기 Mecab-ko, Okt(Open Korean Text), Komoran 등이 한국어 NLP에 주로 사용되며, BPE 기반 토크나이저도 활용된다."
      - "TF-IDF는 문서 내 단어의 중요도를 계산하는 통계적 방법이다."
      - "Word2Vec은 단어를 밀집 벡터로 변환하는 임베딩 알고리즘이다."
      - "BERT는 양방향 트랜스포머를 사용한 사전학습 언어 모델이다."
    correct_idx: 0

  - query: "FastAPI에서 파일 업로드 구현"
    candidates:
      - "Django REST framework에서는 serializer를 사용하여 데이터를 직렬화한다."
      - "Flask에서 request.files를 통해 업로드된 파일에 접근할 수 있다."
      - "FastAPI에서 UploadFile 타입을 사용하면 비동기 파일 업로드를 처리할 수 있으며, python-multipart 패키지가 필요하다."
      - "Express.js에서 multer 미들웨어를 사용하여 파일 업로드를 처리한다."
    correct_idx: 2

  - query: "Git에서 브랜치를 병합할 때 충돌 해결"
    candidates:
      - "git merge 실행 시 충돌이 발생하면 해당 파일에 충돌 마커가 표시되며, 수동으로 편집 후 git add와 git commit으로 병합을 완료한다."
      - "git stash는 작업 중인 변경사항을 임시 저장하는 명령어이다."
      - "GitHub Actions를 사용하여 CI/CD 파이프라인을 구축할 수 있다."
      - "git rebase는 커밋 히스토리를 선형으로 정리하는 데 사용된다."
    correct_idx: 0

  - query: "Redis를 캐시로 사용하는 방법"
    candidates:
      - "MongoDB는 도큐먼트 기반 NoSQL 데이터베이스로 JSON 형태의 데이터를 저장한다."
      - "PostgreSQL의 JSONB 타입을 사용하면 구조화되지 않은 데이터를 효율적으로 저장할 수 있다."
      - "Elasticsearch는 전문 검색 엔진으로 로그 분석에 주로 활용된다."
      - "Redis의 SET/GET 명령과 EXPIRE 옵션을 사용하면 TTL 기반 캐시를 구현할 수 있으며, Spring이나 Django에서 캐시 백엔드로 설정 가능하다."
    correct_idx: 3

  - query: "Transformer 모델의 어텐션 메커니즘"
    candidates:
      - "CNN은 합성곱 레이어를 통해 이미지의 공간적 특징을 추출한다."
      - "RNN은 순환 구조로 시퀀스 데이터를 처리하지만 장기 의존성 문제가 있다."
      - "Transformer의 셀프 어텐션(Self-Attention)은 입력 시퀀스의 모든 위치 간 관계를 동시에 계산하며, Query, Key, Value 행렬을 사용한다."
      - "GAN은 생성자와 판별자의 적대적 학습을 통해 데이터를 생성한다."
    correct_idx: 2

  - query: "쿠버네티스에서 파드가 재시작되는 원인"
    candidates:
      - "쿠버네티스 파드가 반복 재시작되는 주요 원인은 OOMKilled(메모리 부족), CrashLoopBackOff(애플리케이션 크래시), liveness probe 실패 등이다."
      - "Helm 차트를 사용하면 쿠버네티스 애플리케이션을 패키지로 관리할 수 있다."
      - "Istio 서비스 메시는 마이크로서비스 간 트래픽을 관리한다."
      - "Prometheus와 Grafana를 연동하여 쿠버네티스 모니터링 대시보드를 구축할 수 있다."
    correct_idx: 0

  - query: "SQLAlchemy ORM으로 다대다 관계 설정"
    candidates:
      - "Django ORM에서 ManyToManyField를 사용하여 다대다 관계를 정의한다."
      - "SQLAlchemy에서 secondary 파라미터와 association table을 사용하여 relationship()으로 다대다 관계를 설정할 수 있다."
      - "SQL에서 JOIN 절을 사용하여 여러 테이블의 데이터를 결합한다."
      - "Prisma는 TypeScript 기반의 ORM으로 스키마 파일로 모델을 정의한다."
    correct_idx: 1

  - query: "리눅스에서 프로세스 메모리 사용량 확인"
    candidates:
      - "top, htop, ps aux 명령어를 사용하면 프로세스별 메모리(RSS, VSZ) 사용량을 확인할 수 있으며, /proc/[pid]/status 파일로 상세 정보를 볼 수 있다."
      - "df -h 명령어로 디스크 사용량을 확인할 수 있다."
      - "netstat이나 ss 명령어로 네트워크 연결 상태를 확인할 수 있다."
      - "chmod 명령어로 파일 권한을 변경할 수 있다."
    correct_idx: 0
