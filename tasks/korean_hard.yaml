name: 한국어 고난도 문화/뉘앙스 테스트
description: |
  한국 문화, 비즈니스 관습, 언어 뉘앙스를 정확히 이해하고
  제약 조건을 준수하여 답변하는 능력을 평가한다.
type: qa_with_context
evaluator: llm_judge
judge_criteria: compliance

inputs:
  - context: |
      당신은 한국 대기업 신입사원입니다.
      상황: 부장님이 금요일 저녁 회식을 제안했는데, 당신은 이미 선약이 있습니다.

      한국 직장 문화 참고:
      - 직속 상사의 제안은 직접 거절하기 어려움
      - "괜찮습니다"는 문맥에 따라 수락/거절 모두 가능
      - 거절 시 대안을 제시하는 것이 예의
      - 과도한 변명보다는 간결한 사유가 적절
    question: |
      부장님에게 정중하게 거절하는 메시지를 작성하세요.
      조건: (1) 존댓말 사용 (2) 사유를 간결히 (3) 대안 날짜 제시 (4) 3문장 이내
    reference: "존댓말로 정중한 거절 + 간결한 사유 + 대안 날짜 제시, 3문장 이내"

  - context: |
      한국어에서 "눈치"(nunchi)는 다른 사람의 감정, 상황, 분위기를 빠르게 파악하는 능력이다.
      관련 표현:
      - "눈치가 빠르다" = 상황 파악이 빠르다
      - "눈치가 없다" = 분위기 파악을 못한다
      - "눈치를 보다" = 다른 사람의 반응을 살피다
      - "눈치를 주다" = 간접적으로 의사를 전달하다
      - "눈치 게임" = 누가 먼저 행동할지 서로 눈치를 보는 상황
    question: |
      "눈치"를 영어 하나의 단어로 번역할 수 없는 이유를 설명하고,
      한국 직장 생활에서 "눈치"가 중요한 구체적 상황 2가지를 예시로 드세요.
      조건: 각 예시에 위 표현 중 하나 이상을 자연스럽게 활용할 것.
    reference: "눈치의 다층적 의미(감정 파악+사회적 맥락+비언어적 소통) 설명 + 직장 상황 2가지에 표현 활용"

  - context: |
      한국의 대학 입시 제도(2024 기준):
      수시: 학생부교과(내신), 학생부종합(서류+면접), 논술 전형
      정시: 대학수학능력시험(수능) 성적 기반
      비율: 서울 주요 대학 기준 수시 약 70%, 정시 약 30%
      수능 영역: 국어, 수학, 영어, 탐구(사회/과학), 한국사(필수)
      영어: 절대평가(1~9등급), 나머지: 상대평가(표준점수/백분위)
      학생부종합: "스펙"보다 학업 역량, 전공 적합성, 발전 가능성 평가
    question: |
      외국인 학부모에게 한국 입시의 수시와 정시 차이를 설명하세요.
      조건: (1) 미국 시스템과 비교하여 설명 (2) 수능 영어가 절대평가인 이유 추론 포함 (3) 200자 내외
    reference: "수시≈Early Decision+홀리스틱 / 정시≈SAT 기반 선발 비교 + 영어 절대평가 이유(변별력 vs 사교육 경감) + 200자 내외"

  - context: |
      한국의 주요 공휴일과 문화적 의미:
      설날(음력 1/1): 차례, 세배, 떡국, 성묘
      추석(음력 8/15): 차례, 벌초, 송편, 강강술래
      어린이날(5/5): 소파 방정환 제정
      광복절(8/15): 1945년 일본으로부터 해방
      한글날(10/9): 세종대왕 훈민정음 반포 기념

      한국 명절 예절:
      - 차례: 제사상 차림(어동육서, 홍동백서 규칙)
      - 세배: 연장자에게 절하고 덕담 듣기
      - 세뱃돈: 어른이 아이에게 주는 돈
    question: |
      외국인 친구가 한국인 시댁에 설날 방문합니다. 실수하지 않도록
      반드시 알아야 할 예절 3가지를 우선순위 순으로 알려주세요.
      조건: (1) 각 예절의 이유도 설명 (2) "하지 말아야 할 것" 1가지 포함
    reference: "세배 방법 + 차례 예절 + 세뱃돈/식사 예절 등 3가지(이유 포함) + 금기사항 1가지"

  - context: |
      한국 스타트업 생태계 주요 용어:
      - 벤처확인: 벤처기업확인서(세제 혜택, 병역특례 가능)
      - 시리즈A/B/C: 투자 라운드 단계
      - TIPS: 민간 투자 주도형 기술 창업 지원(최대 5억)
      - 판교밸리: 판교테크노밸리, 한국 IT 기업 밀집 지역
      - 네카라쿠배당토: 네이버/카카오/라인/쿠팡/배민/당근/토스
      - 주 52시간: 근로기준법 주 최대 근로시간
      - 스톡옵션: 비상장 벤처 주식매수선택권(세제 혜택 조건부)
    question: |
      한국에서 AI 스타트업을 창업하려는 외국인에게 "벤처확인"을 받아야 하는 이유를
      실질적 혜택 3가지와 함께 설명하세요.
      조건: (1) 영어 용어와 한국어 병기 (2) TIPS 프로그램과의 연계 설명 포함
    reference: "벤처확인 혜택(세제/병역특례/투자유치 등 3가지) + TIPS 연계 + 한영 병기"

  - context: |
      한국어 존대법 체계:
      격식체: 합쇼체(-습니다), 하오체(-오), 하게체(-게), 해라체(-다)
      비격식체: 해요체(-요), 해체(-해)

      사용 상황:
      합쇼체: 공식 발표, 뉴스, 비즈니스 미팅
      해요체: 일상 대화(나이 비슷, 처음 만남)
      해체(반말): 친구, 후배, 어린아이
      하오체/하게체: 현대에서는 거의 사용하지 않음(사극, 문학)

      주의: 나이를 모를 때는 해요체가 안전
      직장에서: 직급에 관계없이 합쇼체 + 직함 호칭이 기본
    question: |
      다음 3가지 상황에서 적절한 존대법 레벨과 그 이유를 설명하세요:
      (1) 면접에서 면접관에게 (2) 동기 입사 동료에게 (첫날) (3) 카페 직원에게
      조건: 각 상황에서 "감사합니다"를 해당 존대법으로 변환한 예문 포함
    reference: "면접→합쇼체(감사합니다), 동료 첫날→해요체(감사해요/고마워요), 카페→해요체(감사해요) + 각 이유"
