<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LLMEval{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card-hover: #1e1e35;
            --accent: #4fc3f7;
            --accent2: #81c784;
            --warn: #ffb74d;
            --bad: #e57373;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: #2a2a3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav */
        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        nav .logo { font-size: 18px; font-weight: bold; color: var(--accent); }
        nav a { color: var(--text-dim); padding: 4px 8px; border-radius: 4px; }
        nav a:hover, nav a.active { color: var(--text); background: var(--border); text-decoration: none; }

        /* Layout */
        main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }

        /* Cards */
        .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            flex: 1;
            min-width: 150px;
        }
        .stat-card .label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; }
        .stat-card .value { font-size: 24px; font-weight: bold; color: var(--accent); margin-top: 4px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { background: var(--border); color: var(--text-dim); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; }
        td { padding: 10px 12px; border-top: 1px solid var(--border); }
        tr:hover td { background: var(--card-hover); }

        /* Score colors */
        .good { color: var(--accent2); }
        .warn { color: var(--warn); }
        .bad { color: var(--bad); }
        .dim { color: var(--text-dim); }
        .positive { color: var(--accent2); }
        .negative { color: var(--bad); }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px 6px 0 0;
            padding: 8px 16px;
            color: var(--text-dim);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }
        .tab-btn:hover, .tab-btn.active { background: var(--border); color: var(--text); }
        #tab-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0 8px 8px 8px;
            padding: 16px;
            min-height: 200px;
        }

        /* Forms */
        select, input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
        }
        select:focus, input:focus { outline: 1px solid var(--accent); }
        button, .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 13px;
        }
        button:hover, .btn:hover { opacity: 0.9; }

        /* Misc */
        .section-title { font-size: 16px; margin-bottom: 12px; color: var(--text-dim); }
        .mb-16 { margin-bottom: 16px; }
        .mb-24 { margin-bottom: 24px; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            background: var(--border);
            color: var(--text-dim);
        }
        .tag.embedding { background: #1b5e20; color: #a5d6a7; }
        .chart-img { max-width: 100%; border-radius: 4px; margin-bottom: 12px; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .loading { color: var(--text-dim); font-style: italic; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">LLMEval</span>
        <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Runs</a>
        <a href="/leaderboard" {% if request.url.path == "/leaderboard" %}class="active"{% endif %}>Leaderboard</a>
        <a href="/compare" {% if request.url.path == "/compare" %}class="active"{% endif %}>Compare</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
